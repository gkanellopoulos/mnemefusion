name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-cpu:
    name: Build CPU wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
            auditwheel: skip
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --manifest-path mnemefusion-python/Cargo.toml ${{ matrix.auditwheel && format('--auditwheel {0}', matrix.auditwheel) || '' }}
          working-directory: .
          before-script-linux: |
            yum install -y clang-devel cmake gcc-c++
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cpu-${{ matrix.target }}
          path: dist/*.whl

  build-gpu:
    name: Build GPU wheel (linux-x86_64-cuda)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure for GPU build
        run: |
          # Switch package name and features for GPU wheel
          sed -i 's/name = "mnemefusion-cpu"/name = "mnemefusion"/' mnemefusion-python/pyproject.toml
          sed -i 's/features = \["pyo3\/extension-module", "entity-extraction"\]/features = ["pyo3\/extension-module", "entity-extraction-cuda"]/' mnemefusion-python/pyproject.toml
          echo "--- pyproject.toml after sed ---"
          cat mnemefusion-python/pyproject.toml

      - name: Build GPU wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          manylinux: "2_28"
          args: --release --out dist --manifest-path mnemefusion-python/Cargo.toml --auditwheel skip
          working-directory: .
          before-script-linux: |
            # Install CUDA toolkit (build-time only, no GPU needed)
            dnf install -y 'dnf-command(config-manager)'
            dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
            dnf install -y cuda-toolkit-12-8 clang-devel cmake gcc-c++
            export CUDA_PATH=/usr/local/cuda-12.8
            export PATH=$CUDA_PATH/bin:$PATH
        env:
          CMAKE_CUDA_ARCHITECTURES: "75-real;80-real;86-real;89-real;90-real"
          RUSTFLAGS: "-C link-arg=-Wl,-rpath,$ORIGIN/../mnemefusion.libs"

      - name: Bundle CUDA backends into wheel
        run: |
          pip install wheel patchelf
          # Find the ggml backend .so files built by cmake (use absolute path)
          BACKEND_DIR=$(find "$(pwd)/target" -path "*/mnemefusion-llama-cpp-sys-2-*/out/build/bin" -type d 2>/dev/null | head -1)
          if [ -z "$BACKEND_DIR" ]; then
            BACKEND_DIR=$(find "$(pwd)/target" -path "*/llama-cpp-sys-2-*/out/build/bin" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$BACKEND_DIR" ]; then
            echo "ERROR: Could not find backend build directory"
            find target -name "libggml-cuda*" -o -name "libggml-cpu*" 2>/dev/null | head -20
            exit 1
          fi
          echo "Found backends in: $BACKEND_DIR"
          ls -la "$BACKEND_DIR"/lib*.so* 2>/dev/null

          # Unpack wheel, add backends, repack
          cd dist
          WHEEL=$(ls *.whl)
          echo "Repacking wheel: $WHEEL"
          python -m wheel unpack "$WHEEL"
          WHEEL_DIR=$(ls -d */ | head -1)
          mkdir -p "$WHEEL_DIR/mnemefusion.libs"

          # Copy backend .so files (dereference symlinks)
          cp -L "$BACKEND_DIR"/libggml-base.so.* "$WHEEL_DIR/mnemefusion.libs/" 2>/dev/null || true
          cp -L "$BACKEND_DIR"/libggml-cpu.so "$WHEEL_DIR/mnemefusion.libs/" 2>/dev/null || true
          cp -L "$BACKEND_DIR"/libggml-cuda.so "$WHEEL_DIR/mnemefusion.libs/" 2>/dev/null || true
          cp -L "$BACKEND_DIR"/libggml.so.* "$WHEEL_DIR/mnemefusion.libs/" 2>/dev/null || true
          cp -L "$BACKEND_DIR"/libllama.so.* "$WHEEL_DIR/mnemefusion.libs/" 2>/dev/null || true

          # Create soname symlinks (dynamic linker needs libggml.so.0, libllama.so.0, etc.)
          cd "$WHEEL_DIR/mnemefusion.libs"
          for f in *.so.*.*.*; do
            base="${f%%.*}"
            ln -sf "$f" "${base}.so.0" 2>/dev/null || true
            ln -sf "$f" "${base}.so" 2>/dev/null || true
          done
          cd -

          # Set RPATH on backend libs so they find each other
          for f in "$WHEEL_DIR"/mnemefusion.libs/*.so*; do
            [ -f "$f" ] && [ ! -L "$f" ] && patchelf --set-rpath '$ORIGIN' "$f" 2>/dev/null || true
          done

          echo "Bundled backends:"
          ls -la "$WHEEL_DIR/mnemefusion.libs/"
          rm "$WHEEL"
          python -m wheel pack "$WHEEL_DIR"
          rm -rf "$WHEEL_DIR"
          echo "Final wheel:"
          ls -la *.whl

      - name: Upload GPU wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-gpu-linux-x86_64
          path: dist/*.whl

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path mnemefusion-python/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-cpu, build-gpu, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/mnemefusion-cpu/
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
